# 기본 설정
title: Veru
description: "리눅스·웹·클라우드 환경의 원리를 탐구하며, 모의해킹과 취약점 분석을 학습과 실습을 통해 기록하고 성장하는 Veru의 보안 연구 일지."
url: "https://ver-uu.github.io"

# 테마 설정
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "dirt"

# 검색 설정
search: true

# 빌드 설정
markdown: kramdown
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: Asia/Seoul
include:
  - _pages

# 플러그인
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jemoji
  - jekyll-include-cache
  - jekyll-remote-theme
  - jekyll-feed 

# 작성자 정보
author:
  name   : "Veru"
  avatar : "/assets/images/veru.png"
  bio    : "My Security Record"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ver-uu"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://www.instagram.com/ver_uu_?igsh=d2szYW13bjh3bjM3&utm_source=qr"

# 기본값 설정
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: false
      comments: true
      share: false
      related: true
      categories: false

  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# 카테고리 설정
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# 댓글 설정
comments:
  provider: "utterances"
  utterances:
    repo: "ver-uu/ver-uu.github.io"
    issue-term: "pathname"
    label: "💬"
    theme: "github-light"
    crossorigin: "anonymous"
encoding: utf-8
safe: true